<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upstage Systems</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0f1115;
    color: #e8e8e8;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  .wrap { max-width: 640px; width: 100%; }
  h1 {
    font-size: 1.8rem;
    margin-bottom: 0.25rem;
    letter-spacing: -0.02em;
  }
  p.sub {
    color: #9aa0a6;
    margin-top: 0;
    margin-bottom: 2rem;
  }
  .apps { display: grid; gap: 1rem; }
  a.app-card {
    display: block;
    padding: 1.25rem 1.5rem;
    background: #1a1d24;
    border: 1px solid #2a2e37;
    border-radius: 10px;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.15s ease, transform 0.15s ease;
  }
  a.app-card:hover {
    border-color: #4a90d9;
    transform: translateY(-1px);
  }
  .app-name { font-weight: 600; font-size: 1.05rem; }
  .app-desc { color: #9aa0a6; font-size: 0.9rem; margin-top: 0.25rem; }
  footer {
    margin-top: 3rem;
    color: #55595f;
    font-size: 0.8rem;
  }
</style>
</head>
<body>
  <div class="wrap">
    <h1>Upstage Systems</h1>
    <p class="sub">Tools for community theater design &amp; planning.</p>
    <div class="apps">
      <a class="app-card" href="/stage-designer/">
        <div class="app-name">Stage Designer</div>
        <div class="app-desc">Set &amp; lighting design tool for the Burgdorff Center for the Performing Arts.</div>
      </a>
      <a class="app-card" href="/solari-board/">
        <div class="app-name">Solari Board</div>
        <div class="app-desc">Split-flap style display board.</div>
      </a>
    </div>
    <footer>apps.upstage.systems</footer>
  </div>
</body>
</html>
